<!doctype html>
<html lang="en" data-theme="sylveon">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Shiny Hunter Z-A</title>
		<!-- Prevent flash of unstyled content: apply saved theme before first paint -->
		<script>
			(function () {
				try {
					var saved = localStorage.getItem('shiny-hunter-theme');
					var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					var theme = saved === 'umbreon' ? 'umbreon'
						: saved === 'sylveon' ? 'sylveon'
						: prefersDark ? 'umbreon'
						: 'sylveon';
					document.documentElement.setAttribute('data-theme', theme);
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
